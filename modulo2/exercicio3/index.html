<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATEC - Matrícula Acadêmica</title>
    <!-- Fonte moderna e legível -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fatec-red: #B00000;
            --fatec-dark-red: #8B0000;
            --bg-body: #f4f4f9;
            --text-dark: #333333;
            --text-muted: #666666;
            --border-color: #cccccc;
            --input-bg: #ffffff;
            --focus-ring: rgba(176, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Container principal estilo Cartão */
        .form-container {
            background-color: #ffffff;
            border-top: 6px solid var(--fatec-red);
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--fatec-red);
            font-size: 24px;
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Estilos dos Fieldsets (Agrupamentos) */
        fieldset {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 25px;
            background-color: #fafafa;
        }

        legend {
            background-color: var(--fatec-red);
            color: #ffffff;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 14px;
        }

        /* Grupos de Input */
        .input-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-dark);
        }

        .input-group input[type="text"],
        .input-group input[type="email"],
        .input-group input[type="date"],
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            background-color: var(--input-bg);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        /* Outline Focus Effect */
        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--fatec-red);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        /* Textarea */
        .input-group textarea {
            resize: vertical;
        }

        /* Rádio Buttons e Checkboxes (Inlines) */
        .radio-group, .checkbox-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
        }

        .radio-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .radio-row label {
            margin-bottom: 0;
            font-weight: 400;
            cursor: pointer;
        }

        .radio-row input[type="radio"],
        .checkbox-group input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: var(--fatec-red);
        }

        /* Bloco de Bônus / Upload e Color */
        .bonus-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .bonus-section input[type="file"] {
            border: 1px dashed var(--border-color);
            padding: 8px;
            background: transparent;
            cursor: pointer;
        }

        .bonus-section input[type="color"] {
            width: 100%;
            height: 40px;
            padding: 2px;
            cursor: pointer;
        }

        /* Botão de Envio */
        button[type="submit"] {
            width: 100%;
            background-color: var(--fatec-red);
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            padding: 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: var(--fatec-dark-red);
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Responsividade */
        @media (max-width: 600px) {
            .bonus-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>FATEC</h1>
        <p class="subtitle">Portal de Pré-Matrícula de Cursos Superiores</p>

        <!-- Início do Formulário com Validação Habilitada -->
        <form action="#" method="get" id="fatecForm">

            <!-- 1. DADOS PESSOAIS -->
            <fieldset>
                <legend>Dados Pessoais</legend>

                <div class="input-group">
                    <label for="nome">Nome completo:</label>
                    <!-- minlength="5" garante no minimo 5 caracteres, required garante envio não vazio -->
                    <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva" minlength="5" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail corporativo ou pessoal:</label>
                    <input type="email" id="email" name="email" placeholder="nome@email.com" required>
                </div>

                <div class="bonus-section">
                    <div class="input-group">
                        <label for="nascimento">Data de Nascimento:</label>
                        <input type="date" id="nascimento" name="nascimento" required>
                    </div>

                    <div class="input-group">
                        <label for="cpf">CPF:</label>
                        <!-- Pattern restrito forçando X 3 números, ponto, hífen, XX. -->
                        <input type="text" id="cpf" name="cpf" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="000.000.000-00" title="Digite o CPF no formato 000.000.000-00" required>
                    </div>
                </div>
            </fieldset>

            <!-- 2. DADOS ACADÊMICOS -->
            <fieldset>
                <legend>Dados Acadêmicos</legend>

                <div class="input-group">
                    <label for="curso">Curso Desejado:</label>
                    <select id="curso" name="curso" required>
                        <option value="" disabled selected>Selecione um Curso...</option>
                        <option value="ads">Análise e Desenvolvimento de Sistemas</option>
                        <option value="gti">Gestão da Tecnologia da Informação</option>
                        <option value="rh">Gestão de Recursos Humanos</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Período das Aulas:</label>
                    <div class="radio-group">
                        <div class="radio-row">
                            <input type="radio" id="manha" name="periodo" value="manha" required>
                            <label for="manha">Manhã</label>
                        </div>
                        <div class="radio-row">
                            <input type="radio" id="noite" name="periodo" value="noite">
                            <label for="noite">Noite</label>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="experiencia" name="experiencia" value="sim">
                        <label for="experiencia" style="margin-bottom:0;">Você já programou antes ou possui alguma experiência técnica?</label>
                    </div>
                </div>
            </fieldset>

            <!-- 3. OBSERVAÇÕES E EXTRA -->
            <fieldset>
                <legend>Adicionais</legend>

                <div class="input-group">
                    <label for="observacoes">Observações ou Dúvidas Extras:</label>
                    <textarea id="observacoes" name="observacoes" rows="4" placeholder="Escreva algo sobre você ou suas expectativas..."></textarea>
                </div>

                <!-- Extras Bonus -->
                <div class="bonus-section" style="margin-top: 20px;">
                    <div class="input-group">
                        <label for="foto">Foto 3x4 (Upload):</label>
                        <input type="file" id="foto" name="foto" accept="image/png, image/jpeg">
                    </div>

                    <div class="input-group">
                        <label for="cor">Escolha a cor do seu crachá:</label>
                        <!-- Seletor de cores Bônus -->
                        <input type="color" id="cor" name="cor" value="#B00000">
                    </div>
                </div>
            </fieldset>

            <!-- 4. SUBMIT -->
            <button type="submit">EFETUAR PRÉ-MATRÍCULA</button>

        </form>
    </div>

</body>
</html>
